<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가온 시안 모아보기</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: #ffffff;
      color: #111827;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 40px;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #111827;
    }

    .header p {
      margin: 0;
      color: #6b7280;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #4a89ff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, .08);
    }

    .card.active {
      border-color: #4a89ff;
      box-shadow: 0 0 0 1px rgba(74, 137, 255, .2) inset;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #2563eb;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.4;
      color: #111827;
    }

    .card p {
      margin: 0 0 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
      min-height: 44px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s ease, transform .2s ease;
    }

    .btn:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .btn-primary {
      background: #4a89ff;
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid #e5e7eb;
    }

    .viewer {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }

    .viewer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid #e5e7eb;
      background: #f8fafc;
    }

    .viewer-title {
      min-width: 0;
    }

    .viewer-title strong {
      display: block;
      font-size: 18px;
      margin-bottom: 4px;
      color: #111827;
    }

    .viewer-title span {
      display: block;
      color: #6b7280;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 280px);
      min-height: 700px;
      border: 0;
      background: white;
    }

    .note {
      margin-top: 14px;
      color: #6b7280;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 22px;
      }

      .viewer-top {
        flex-direction: column;
        align-items: flex-start;
      }

      iframe {
        height: 75vh;
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>가온 홈페이지 / 시안 모아보기</h1>
      <p>
        아래 카드 중 하나를 클릭하면 하단 미리보기 영역에서 바로 확인할 수 있습니다.
        오른쪽 버튼으로는 새 탭에서 원본 페이지를 열 수 있습니다.
      </p>
    </div>

    <div class="grid" id="cardGrid"></div>

    <div class="viewer">
      <div class="viewer-top">
        <div class="viewer-title">
          <strong id="viewerName">현재 홈페이지</strong>
          <span id="viewerUrl">https://gaon-connect.framer.website/</span>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="reloadBtn" type="button">다시 불러오기</button>
          <a class="btn btn-secondary" id="openNewTab" href="https://gaon-connect.framer.website/" target="_blank" rel="noopener noreferrer">새 탭에서 열기</a>
        </div>
      </div>

      <iframe
        id="previewFrame"
        src="https://gaon-connect.framer.website/"
        title="가온 시안 미리보기"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

    <p class="note">
      일부 사이트는 보안 설정(X-Frame-Options / CSP) 때문에 iframe 안에서 표시되지 않을 수 있습니다.
      그 경우 “새 탭에서 열기” 버튼으로 확인하면 됩니다.
    </p>
  </div>

  <script>
    const pages = [
      {
        name: "현재 홈페이지",
        type: "LIVE",
        desc: "운영 중인 현재 메인 페이지",
        url: "https://gaon-connect.framer.website/"
      },
      {
        name: "시안 (주황색)",
        type: "DRAFT",
        desc: "주황 포인트 컬러 기반 시안",
        url: "https://chagpts.github.io/gaon/incorporation/step1_7.html"
      },
      {
        name: "시안 (검은색)",
        type: "DRAFT",
        desc: "다크 톤 중심의 검은색 시안",
        url: "https://chagpts.github.io/gaon/incorporation/step1_9.html"
      },
      {
        name: "토스 사이트",
        type: "REFERENCE",
        desc: "디자인 참고용 토스 공식 사이트",
        url: "https://toss.im/"
      },
      {
        name: "시안 (토스반영)",
        type: "DRAFT",
        desc: "토스 반영한 버전",
        url: "https://chagpts.github.io/gaon/sample/sample1.html"
      },
      {
        name: "시안 (토스반영 회색)",
        type: "DRAFT",
        desc: "토스 반영한 회색 버전",
        url: "https://chagpts.github.io/gaon/sample/sample2.html"
      },
      {
        name: "시안 (로고)",
        type: "DRAFT",
        desc: "로고 강조 버전 시안",
        url: "https://chagpts.github.io/gaon/incorporation/step1_11.html"
      }
    ];

    const cardGrid = document.getElementById("cardGrid");
    const previewFrame = document.getElementById("previewFrame");
    const viewerName = document.getElementById("viewerName");
    const viewerUrl = document.getElementById("viewerUrl");
    const openNewTab = document.getElementById("openNewTab");
    const reloadBtn = document.getElementById("reloadBtn");

    function setActiveCard(url) {
      document.querySelectorAll(".card").forEach(card => {
        card.classList.toggle("active", card.dataset.url === url);
      });
    }

    function loadPage(page) {
      previewFrame.src = page.url;
      viewerName.textContent = page.name;
      viewerUrl.textContent = page.url;
      openNewTab.href = page.url;
      setActiveCard(page.url);
    }

    pages.forEach((page, index) => {
      const card = document.createElement("div");
      card.className = "card" + (index === 0 ? " active" : "");
      card.dataset.url = page.url;

      card.innerHTML = `
        <div class="badge">${page.type}</div>
        <h2>${page.name}</h2>
        <p>${page.desc}</p>
        <div class="actions">
          <button class="btn btn-primary" type="button">여기서 보기</button>
          <a class="btn btn-secondary" href="${page.url}" target="_blank" rel="noopener noreferrer">새 탭</a>
        </div>
      `;

      card.addEventListener("click", (e) => {
        const isLink = e.target.closest("a");
        if (isLink) return;
        loadPage(page);
      });

      const viewBtn = card.querySelector(".btn-primary");
      viewBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        loadPage(page);
      });

      cardGrid.appendChild(card);
    });

    reloadBtn.addEventListener("click", () => {
      const current = previewFrame.src;
      previewFrame.src = current;
    });
  </script>
</body>
</html>
