<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>16명 4테이블 뽑기</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .input-area {
      max-width: 600px;
      margin: 0 auto 30px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* 참가자 목록 안 보이게 */
    #names {
      display: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 16px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
    }

    button:disabled {
      background: #777;
      cursor: not-allowed;
    }

    .card-area {
      display: none;
      justify-content: center;
      margin: 40px 0;
    }

    .card {
      width: 180px;
      height: 240px;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .spinning {
      animation: spin 0.5s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotateY(0deg) rotateZ(0deg);
      }
      to {
        transform: rotateY(360deg) rotateZ(360deg);
      }
    }

    .tables {
      display: none;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .table-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      animation: fadeIn 0.7s ease;
    }

    .table-box h2 {
      text-align: center;
      margin-top: 0;
    }

    .table-box ul {
      list-style: none;
      padding: 0;
    }

    .table-box li {
      padding: 10px;
      margin: 8px 0;
      background: #eee;
      border-radius: 6px;
      text-align: center;
      font-size: 18px;
    }

    .tony {
      background: #ffe08a !important;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .tables {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .tables {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<h1>월드컵 랜덤 뽑기</h1>
  <div class="input-area">
    <p>
      버튼을 누르면 3초 후 조가 공개됩니다.<br>
      <strong>TONY는 무조건 A조에 배정됩니다.</strong>
    </p>

    <!-- 참가자 목록은 화면에 보이지 않음 -->
    <textarea id="names">TONY
철수
영희
민수
지민
수현
지훈
서연
도윤
하준
예준
서준
하윤
지아
유진
민재</textarea>

    <button id="drawBtn" onclick="startDraw()">뽑기</button>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card" id="card">추첨중</div>
  </div>

  <div class="tables" id="result"></div>

  <script>
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function startDraw() {
      const button = document.getElementById("drawBtn");
      const cardArea = document.getElementById("cardArea");
      const card = document.getElementById("card");
      const result = document.getElementById("result");

      button.disabled = true;
      button.textContent = "뽑는 중...";

      result.style.display = "none";
      result.innerHTML = "";

      cardArea.style.display = "flex";
      card.textContent = "추첨중";
      card.classList.add("spinning");

      setTimeout(() => {
        card.classList.remove("spinning");
        card.textContent = "완료!";
        drawTables();

        button.disabled = false;
        button.textContent = "다시 뽑기";
      }, 3000);
    }

    function drawTables() {
      const textarea = document.getElementById("names");
      let names = textarea.value
        .split("\n")
        .map(name => name.trim())
        .filter(name => name !== "");

      if (names.length !== 16) {
        alert("참가자는 정확히 16명이어야 합니다.");
        return;
      }

      const hasTony = names.some(name => name.toUpperCase() === "TONY");

      if (!hasTony) {
        alert("TONY가 반드시 포함되어야 합니다.");
        return;
      }

      const uniqueNames = new Set(names.map(name => name.toUpperCase()));
      if (uniqueNames.size !== 16) {
        alert("중복된 이름이 있습니다. 이름을 확인해주세요.");
        return;
      }

      let others = names.filter(name => name.toUpperCase() !== "TONY");

      shuffle(others);

      const groups = {
        "홍대 조": ["TONY", ...others.slice(0, 3)],
        "성수 조": others.slice(3, 7),
        "남대문 조": others.slice(7, 11),
        "동대문 조": others.slice(11, 15)
      };

      const result = document.getElementById("result");
      result.innerHTML = "";

      for (const groupName in groups) {
        const box = document.createElement("div");
        box.className = "table-box";

        const title = document.createElement("h2");
        title.textContent = groupName;
        box.appendChild(title);

        const ul = document.createElement("ul");

        groups[groupName].forEach(name => {
          const li = document.createElement("li");
          li.textContent = name;

          if (name.toUpperCase() === "TONY") {
            li.className = "tony";
          }

          ul.appendChild(li);
        });

        box.appendChild(ul);
        result.appendChild(box);
      }

      result.style.display = "grid";
    }
  </script>

</body>
</html>
