<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RA 등록 및 갱신 신청</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .container {
      max-width: 760px;
      margin: 50px auto;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 32px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .service-box {
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }

    .service {
      padding: 20px 22px;
      border-bottom: 1px solid #ededed;
    }

    .service:last-child {
      border-bottom: none;
    }

    .service-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .service-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .service-price {
      font-size: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .form-area {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px dashed #dddddd;
    }

    .form-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 7px;
      color: #333;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d6d6d6;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #1450b8;
    }

    .row {
      display: flex;
      gap: 12px;
    }

    .row .form-group {
      flex: 1;
    }

    .total-box {
      margin-top: 18px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      background: #fafafa;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 18px;
      font-weight: 700;
    }

    .total-price {
      font-size: 22px;
      font-weight: 800;
    }

    .payment-section {
      margin-top: 28px;
    }

    .payment-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .payment-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .account-box {
      background: #f7f7f7;
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      padding: 18px 16px;
      margin-bottom: 14px;
    }

    .account-box-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .account-line {
      font-size: 15px;
      line-height: 1.9;
      color: #333;
    }

    .depositor-group {
      margin-top: 14px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 26px;
      border: none;
      background: #0d47a1;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0b3f8d;
    }

    @media (max-width: 640px) {
      .container {
        margin: 20px;
        padding: 22px;
      }

      .service-header,
      .total-box {
        flex-direction: column;
        align-items: flex-start;
      }

      .row {
        flex-direction: column;
        gap: 0;
      }
    }
    .service-desc{
  font-size:13px;
  color:#666;
  margin-top:4px;
}
  </style>
</head>
<body>
  <div class="container">
    <div class="title">RA 등록 및 갱신 신청</div>

    <div class="section-label">선택한 서비스</div>

    <div class="service-box">
      <div class="service">
        <div class="service-header">
          <div class="service-name">RA 등록 및 갱신 서비스</div>
          <div class="service-price">$250</div>
        </div>
      </div>

<div class="service">
  <div class="service-header">
    <div>
      <div class="service-name">RA 주소 등록 비용</div>
      <div class="service-desc">
        해당 비용은 아래 입력한 고객 카드로 결제됩니다.
      </div>
    </div>
    <div class="service-price">$50</div>
  </div>

  <div class="form-area">
    <div class="form-title">고객 카드 정보 입력</div>

    <div class="form-group">
      <label>서명</label>
      <input type="text" placeholder="Signature" />
    </div>

    <div class="form-group">
      <label>카드번호</label>
      <input type="text" placeholder="1234 5678 9012 3456" />
    </div>

    <div class="row">
      <div class="form-group">
        <label>유효기간</label>
        <input type="text" placeholder="MM/YY" />
      </div>

      <div class="form-group">
        <label>CVV</label>
        <input type="text" placeholder="123" />
      </div>
    </div>

    <div class="form-group">
      <label>주소</label>
      <textarea rows="3" placeholder="Billing Address"></textarea>
    </div>

  </div>
</div>

    <div class="total-box">
      <div class="total-label">총 결제 금액</div>
      <div class="total-price">$250</div>
    </div>

    <div class="payment-section">
      <div class="payment-title">결제 방식</div>
      <div class="payment-desc">현재는 계좌이체를 통한 결제만 가능합니다.</div>

      <div class="account-box">
        <div class="account-box-title">입금하실 계좌</div>
        <div class="account-line">국민은행 123-4567890</div>
        <div class="account-line">예금주 가온오버시즈매니지먼트 주식회사</div>
        <div class="account-line">금액 $425</div>
      </div>

      <div class="form-group depositor-group">
        <label for="depositor-name">입금자명</label>
        <input type="text" id="depositor-name" placeholder="입금자명을 입력하세요." />
      </div>
    </div>

    <button class="submit-btn">결제 신청</button>
  </div>
</body>
</html>
